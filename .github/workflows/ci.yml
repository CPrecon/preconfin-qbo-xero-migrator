name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/financial-assessment-engine/requirements-contract.txt
      - run: pip install -r packages/financial-assessment-engine/requirements-contract.txt
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:contract
      - run: npm run build
      - run: npm run pages:build:staging -w apps/web
